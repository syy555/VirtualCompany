company:
  name: "Virtual Company"
  description: "AI-powered virtual software company"

defaults:
  provider: anthropic
  model: claude-sonnet-4-20250514
  api_key_env: ANTHROPIC_API_KEY
  tool: claude-code

review:
  cycle: weekly
  thresholds:
    warning: 0.6
    replace: 0.4
  auto_replace: false  # 需要 Owner 确认

server:
  port: 3000
  ws_port: 3001

database:
  path: ./data/vc.db
